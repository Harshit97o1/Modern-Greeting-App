<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern, premium greeting web application with beautiful animations and micro-interactions." />
  <title>Modern Greeting App</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Background animation container -->
  <div id="animation-canvas" aria-hidden="true"></div>

  <!-- Floating ambient orbs -->
  <div class="ambient-orb orb-1" aria-hidden="true"></div>
  <div class="ambient-orb orb-2" aria-hidden="true"></div>
  <div class="ambient-orb orb-3" aria-hidden="true"></div>

  <!-- Main card -->
  <main class="card" id="greeting-card">
    <div class="card-shine" aria-hidden="true"></div>

    <h1 class="card-title">Enter Your Name</h1>

    <div class="input-group">
      <input
        type="text"
        id="name-input"
        class="input-field"
        placeholder="Type your name here"
        autocomplete="off"
        spellcheck="false"
      />
      <span class="input-highlight" aria-hidden="true"></span>
    </div>

    <button id="greet-btn" class="btn-primary" type="button">
      <span class="btn-text">Greet</span>
      <span class="btn-ripple" aria-hidden="true"></span>
    </button>

    <p id="greeting-output" class="greeting-text" aria-live="polite"></p>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
